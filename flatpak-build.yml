app-id: com.nick2bad4u.fitfileviewer
command: fitfileviewer
finish-args:
    - --share=network
    - --socket=x11
    - --socket=wayland
    - --device=dri
    - --filesystem=host
    - --env=ELECTRON_IS_DEV=0
modules:
    - build-commands:
          - cp -r ./node_modules /app/
          - mkdir -p /app/bin /app/lib/electron
          - cp -a ./node_modules/electron/dist/. /app/lib/electron/
          - rm -rf /app/node_modules/electron/dist
          - >-
              printf '%s\n' '#!/bin/sh'
              'exec /app/lib/electron/electron --no-sandbox /app "$@"'
              > /app/bin/fitfileviewer
          - chmod 0755 /app/bin/fitfileviewer
          - cp -r ./dist /app/
          - install -Dm644 ./package.json /app/package.json
          - install -Dm644 ./static/app/index.html /app/index.html
          - install -Dm644 ./static/app/style.css /app/style.css
          - install -Dm644 ./static/app/elevProfile.css /app/elevProfile.css
          - install -Dm644 ./static/icons/favicon.ico /app/favicon.ico
          - cp -r ./static/ffv /app/
          - cp -r ./static/icons /app/
      buildsystem: simple
      name: app
      sources:
          - path: .
            type: dir
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
