# This is a Dependabot configuration file for automating dependency updates.
# The configuration is set to version 2 of the Dependabot schema.
# It defines update settings for GitHub Actions and npm package ecosystems.
# Each ecosystem has its own update configuration, including:
# - The directory to scan for dependencies (root directory in this case).
# - The schedule for checking updates (monthly).
# - Allowing both direct and indirect updates for all packages.
# - Grouping updates by ecosystem with specific patterns for version updates.

version: 2

multi-ecosystem-groups:
    dependabot-all:
        target-branch: main
        schedule:
            interval: "monthly"
            time: "05:30"
            timezone: "America/Detroit"
        assignees:
            - "Nick2bad4u"
        labels:
            - "dependabot"
            - "dependencies"
        commit-message:
            prefix: "[dependabot][all]"
            prefix-development: "[dependabot][dev][all]"
            include: "scope"

updates:
    - package-ecosystem: github-actions
      cooldown:
          default-days: 3
          include: ["*"]
      directory: /
      allow:
          # Allow both direct and indirect updates for all packages
          - dependency-type: "all"
      labels:
          - "github-actions"
      multi-ecosystem-group: dependabot-all
      patterns:
          - "*"

    - package-ecosystem: npm
      cooldown:
          default-days: 3
          include: ["*"]
      directory: /
      versioning-strategy: increase
      allow:
          # Allow both direct and indirect updates for all packages
          - dependency-type: "all"
      ignore:
          - dependency-name: "electron-builder"
            versions: ["< 26.0.18"]
          - dependency-name: "electron-builder-squirrel-windows"
            versions: ["< 26.0.18"]
          # Keep the docs workspace green too.
          - dependency-name: "form-data"
          - dependency-name: "qs"
          - dependency-name: "tough-cookie"
      labels:
          - "npm"
      multi-ecosystem-group: dependabot-all
      patterns:
          - "*"
