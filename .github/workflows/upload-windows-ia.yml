name: Upload Windows Distributables to Archive Org
run-name: Upload Windows Distributables to Archive Org (${{ github.ref_name }})

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Build And Release Electron App"]
        types:
            - completed
        branches:
            - main

concurrency:
    group: IAWINDOWS-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
jobs:
    upload-windows:
        name: Upload Windows Distributables
        if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Download Windows release assets (msi-)
              id: download_msi
              uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
              with:
                  latest: true
                  fileName: "Fit-File-Viewer-msi-*"
                  out-file-path: release-dist
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Download Windows release assets (nsis-)
              id: download_nsis
              uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
              with:
                  latest: true
                  fileName: "Fit-File-Viewer-nsis-*"
                  out-file-path: release-dist
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Download Windows release assets (portable-)
              id: download_portable
              uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
              with:
                  latest: true
                  fileName: "Fit-File-Viewer-portable-*"
                  out-file-path: release-dist
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Download Windows release assets (latest.yml)
              id: download_latest
              uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
              with:
                  latest: true
                  fileName: "latest.yml"
                  out-file-path: release-dist
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Windows distributables to archive.org
              uses: Nick2bad4u/internet-archive-upload@369aaddeede5cca7f0be4cb39dcc89e35afbdf48 # v2.0.0
              with:
                  access-key: ${{ secrets.IA_ACCESS_KEY }}
                  secret-key: ${{ secrets.IA_SECRET_KEY }}
                  identifier: fitfileviewer-windows-${{ steps.download_msi.outputs.tag_name }}
                  files: release-dist/
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
