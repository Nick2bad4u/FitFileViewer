name: Release Rehearsal
run-name: Release Rehearsal (${{ github.ref_name }})

concurrency:
    group: release-rehearsal-${{ github.ref }}
    cancel-in-progress: true

on:
    workflow_dispatch:
        inputs:
            require-code-signing:
                description: "Fail if the configured signing environment is incomplete"
                required: true
                default: "false"
                type: choice
                options:
                    - "false"
                    - "true"
            smoke-timeout-ms:
                description: "Packaged app smoke timeout in milliseconds"
                required: true
                default: "15000"
                type: string
            fail-fast:
                description: "Cancel remaining platform rehearsals after the first failure"
                required: true
                default: "false"
                type: choice
                options:
                    - "false"
                    - "true"

permissions:
    contents: read

jobs:
    release-rehearsal:
        name: Verify Unsigned Release Package (${{ matrix.runner-os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        strategy:
            fail-fast: ${{ inputs.fail-fast == 'true' }}
            matrix:
                include:
                    - os: ubuntu-latest
                      runner-os: Linux
                      release-verify-command: xvfb-run -a npm run release:verify
                    - os: windows-latest
                      runner-os: Windows
                      release-verify-command: npm run release:verify
                    - os: macos-latest
                      runner-os: macOS
                      release-verify-command: npm run release:verify
        env:
            CI: true
            NODE_OPTIONS: --max_old_space_size=8192
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              if: runner.os == 'Linux'
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0

            - name: Setup Node.js environment (v24)
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24

            - name: Install app and docs dependencies
              run: |
                  npm ci --no-audit --no-fund
                  npm ci --prefix docusaurus --no-audit --no-fund

            - name: Check signing environment
              run: npm run release:check-signing -- --runner-os "${{ matrix.runner-os }}"
              env:
                  REQUIRE_CODE_SIGNING: ${{ inputs.require-code-signing }}
                  RUNNER_OS: ${{ matrix.runner-os }}

            - name: Run release verification and packaged smoke
              run: ${{ matrix.release-verify-command }}
              env:
                  CSC_IDENTITY_AUTO_DISCOVERY: "false"
                  FFV_PACKAGED_SMOKE_TIMEOUT_MS: ${{ inputs.smoke-timeout-ms }}
                  FFV_FORCE_UNSIGNED_PACKAGE: "true"
                  REQUIRE_CODE_SIGNING: "false"
                  RUNNER_OS: ${{ matrix.runner-os }}

            - name: List unsigned rehearsal artifacts
              if: always()
              run: npm run release:list-release-dist-files

            - name: Upload rehearsal artifacts
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: release-rehearsal-${{ matrix.runner-os }}
                  path: release-dist/**
                  if-no-files-found: error
                  include-hidden-files: true
