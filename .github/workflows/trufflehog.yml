name: Truffle Hog Secret Scan
run-name: Truffle Hog Secret Scan (${{ github.ref_name }})

on:
    push:
    pull_request:
    merge_group:
        types:
            - checks_requested
    workflow_dispatch:
    schedule:
        - cron: "44 4 * * 0" # Runs every Sunday at midnight UTC; https://crontab.guru/#0_0_*_*_0

permissions:
    contents: read

concurrency:
    group: trufflehog-${{ github.ref }}
    cancel-in-progress: true

jobs:
    trufflehog:
        name: Truffle Hog Secret Scan
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
              with:
                  egress-policy: audit

            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
            - name: Secret Scanning (entire repo)
              uses: trufflesecurity/trufflehog@116e7171542d2f1dad8810f00dcfacbe0b809183 # v3.92.5
              with:
                  base: ""
                  head: ${{ github.ref_name }}
                  extra_args: --results=verified,unknown
