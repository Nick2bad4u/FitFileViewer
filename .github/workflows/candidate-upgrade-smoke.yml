name: Candidate Windows Upgrade Smoke
run-name: Candidate Windows Upgrade Smoke (${{ github.ref_name }})

on:
    workflow_dispatch:
        inputs:
            from-version:
                description: Published Windows version to upgrade
                required: true
                default: "29.9.0"
                type: string

concurrency:
    group: candidate-windows-upgrade-${{ github.ref }}-${{ inputs.from-version }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    upgrade:
        name: Upgrade v${{ inputs.from-version }} to candidate
        runs-on: windows-latest
        timeout-minutes: 35
        defaults:
            run:
                shell: pwsh
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version

            - name: Setup npm version
              run: npm install --global npm@11.16.0

            - name: Install dependencies
              run: npm ci --no-audit --no-fund

            - name: Resolve versions and paths
              env:
                  FROM_VERSION: ${{ inputs.from-version }}
              run: |
                  if ($env:FROM_VERSION -notmatch '^\d+\.\d+\.\d+$') {
                      throw "Invalid from-version: $env:FROM_VERSION"
                  }
                  $candidateVersion = node -p "require('./package.json').version"
                  if ($candidateVersion -notmatch '^\d+\.\d+\.\d+$') {
                      throw "Invalid candidate version: $candidateVersion"
                  }
                  if ([version]$env:FROM_VERSION -gt [version]$candidateVersion) {
                      throw "Candidate $candidateVersion is older than $env:FROM_VERSION."
                  }

                  $installDirectory = Join-Path $env:RUNNER_TEMP (
                    "ffv-candidate-upgrade-$env:FROM_VERSION"
                  )
                  "FFV_CANDIDATE_VERSION=$candidateVersion" >> $env:GITHUB_ENV
                  "FFV_UPGRADE_EXECUTABLE=$(Join-Path $installDirectory 'Fit File Viewer.exe')" >> $env:GITHUB_ENV
                  "FFV_UPGRADE_INSTALL_DIR=$installDirectory" >> $env:GITHUB_ENV

            - name: Download previous Windows installer
              env:
                  FROM_VERSION: ${{ inputs.from-version }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  New-Item -ItemType Directory -Path release-inputs -Force |
                    Out-Null
                  gh release download "v$env:FROM_VERSION" `
                    --pattern "Fit-File-Viewer-nsis-x64-$env:FROM_VERSION.exe" `
                    --dir release-inputs

            - name: Install previous release
              env:
                  FROM_VERSION: ${{ inputs.from-version }}
              run: |
                  $installer = Resolve-Path (
                    "release-inputs/Fit-File-Viewer-nsis-x64-$env:FROM_VERSION.exe"
                  )
                  $process = Start-Process -FilePath $installer `
                    -ArgumentList @("/S", "/D=$env:FFV_UPGRADE_INSTALL_DIR") `
                    -Wait -PassThru
                  if ($process.ExitCode -ne 0) {
                      throw "Previous installer exited with $($process.ExitCode)."
                  }
                  $productVersion = (Get-Item -LiteralPath (
                    $env:FFV_UPGRADE_EXECUTABLE
                  )).VersionInfo.ProductVersion
                  if ($productVersion -notmatch '^(\d+\.\d+\.\d+)(?:\.\d+)?$' -or
                      $Matches[1] -ne $env:FROM_VERSION) {
                      throw "Installed $productVersion instead of $env:FROM_VERSION."
                  }

            - name: Build unsigned candidate NSIS installer
              env:
                  CSC_IDENTITY_AUTO_DISCOVERY: "false"
                  FFV_FORCE_UNSIGNED_PACKAGE: "true"
                  REQUIRE_CODE_SIGNING: "false"
              run: >-
                  node scripts/build-package.mjs
                  --win nsis
                  --x64
                  --publish never

            - name: Install candidate over previous release
              run: |
                  Get-Process -Name "Fit File Viewer" -ErrorAction SilentlyContinue |
                    Stop-Process -Force -ErrorAction SilentlyContinue
                  $candidate = Resolve-Path (
                    "release-dist/Fit-File-Viewer-nsis-x64-$env:FFV_CANDIDATE_VERSION.exe"
                  )
                  $process = Start-Process -FilePath $candidate `
                    -ArgumentList @("/S", "--updated") -Wait -PassThru
                  if ($process.ExitCode -ne 0) {
                      throw "Candidate installer exited with $($process.ExitCode)."
                  }

            - name: Verify candidate upgrade identity
              run: |
                  $productVersion = (Get-Item -LiteralPath (
                    $env:FFV_UPGRADE_EXECUTABLE
                  )).VersionInfo.ProductVersion
                  if ($productVersion -notmatch '^(\d+\.\d+\.\d+)(?:\.\d+)?$' -or
                      $Matches[1] -ne $env:FFV_CANDIDATE_VERSION) {
                      throw "Upgrade left $productVersion installed; expected $env:FFV_CANDIDATE_VERSION."
                  }

                  $uninstallRoots = @(
                    "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall",
                    "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall",
                    "HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall"
                  )
                  $entries = @(
                    foreach ($root in $uninstallRoots) {
                        if (Test-Path -LiteralPath $root) {
                            Get-ChildItem -LiteralPath $root |
                                ForEach-Object {
                                    Get-ItemProperty -LiteralPath $_.PSPath
                                } |
                                Where-Object {
                                    $_.DisplayName -like "Fit File Viewer*"
                                }
                        }
                    }
                  )
                  $entries |
                    Select-Object DisplayName, DisplayVersion, InstallLocation, PSChildName |
                    ConvertTo-Json -Depth 3 |
                    Set-Content -LiteralPath (
                        Join-Path $env:RUNNER_TEMP "candidate-upgrade-registry.json"
                    )
                  if ($entries.Count -ne 1) {
                      throw "Expected one Fit File Viewer uninstall entry; found $($entries.Count)."
                  }

                  $stableGuid = "acb439ea-52e6-5f57-a281-e53187b169ce"
                  $transientGuid = "d3d1f287-232f-5429-866d-15b2b1d5fbad"
                  $stableKeys = @(
                    "HKCU:\Software\$stableGuid",
                    "HKLM:\Software\$stableGuid"
                  ) | Where-Object { Test-Path -LiteralPath $_ }
                  $transientKeys = @(
                    "HKCU:\Software\$transientGuid",
                    "HKLM:\Software\$transientGuid"
                  ) | Where-Object { Test-Path -LiteralPath $_ }
                  if ($stableKeys.Count -ne 1 -or $transientKeys.Count -ne 0) {
                      throw "Unexpected installer identity state: stable=$($stableKeys.Count), transient=$($transientKeys.Count)."
                  }

            - name: Smoke test upgraded executable
              run: >-
                  node scripts/run-packaged-smoke.mjs
                  --executable "$env:FFV_UPGRADE_EXECUTABLE"
                  --startup-timeout-ms 15000

            - name: Upload candidate upgrade evidence
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: candidate-upgrade-evidence-${{ inputs.from-version }}
                  if-no-files-found: ignore
                  path: ${{ runner.temp }}/candidate-upgrade-registry.json

            - name: Clean up isolated installation
              if: always()
              run: |
                  Get-Process -Name "Fit File Viewer" -ErrorAction SilentlyContinue |
                    Stop-Process -Force -ErrorAction SilentlyContinue
                  $uninstaller = Join-Path $env:FFV_UPGRADE_INSTALL_DIR (
                    "Uninstall Fit File Viewer.exe"
                  )
                  if (Test-Path -LiteralPath $uninstaller -PathType Leaf) {
                      Start-Process -FilePath $uninstaller -ArgumentList "/S" -Wait
                  }
