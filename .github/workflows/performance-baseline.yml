name: Performance Baseline
run-name: Performance Baseline (${{ github.ref_name }})

concurrency:
    group: performance-baseline-${{ github.ref }}
    cancel-in-progress: true

on:
    schedule:
        - cron: "41 10 * * 2"
    workflow_dispatch:
        inputs:
            threshold-percent:
                description: "Allowed regression threshold for comparable metrics"
                required: true
                default: "25"
                type: string

permissions:
    contents: read

jobs:
    performance-baseline:
        name: Compare FIT Performance Trend
        runs-on: ubuntu-latest
        timeout-minutes: 45
        env:
            NODE_OPTIONS: --max_old_space_size=8192
            PERF_REGRESSION_THRESHOLD_PERCENT: ${{ inputs['threshold-percent'] || '25' }}
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0

            - name: Setup Node.js environment (v24)
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24

            - name: Install app dependencies
              run: npm ci --no-audit --no-fund

            - name: Restore trusted performance baseline
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: artifacts/performance-baseline-cache/performance-baseline.json
                  key: performance-baseline-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
                  restore-keys: |
                      performance-baseline-${{ runner.os }}-${{ github.ref_name }}-
                      performance-baseline-${{ runner.os }}-

            - name: Prepare previous baseline
              run: |
                  mkdir -p artifacts
                  if [ -f artifacts/performance-baseline-cache/performance-baseline.json ]; then
                    cp artifacts/performance-baseline-cache/performance-baseline.json artifacts/performance-baseline.previous.json
                  else
                    echo "[perf] No cached baseline found; this run will seed the trend cache."
                  fi

            - name: Run performance trend check
              run: |
                  mkdir -p artifacts/performance-baseline-cache
                  set -o pipefail
                  xvfb-run -a npm run perf:trend -- --threshold-percent "$PERF_REGRESSION_THRESHOLD_PERCENT" 2>&1 | tee artifacts/performance-baseline.log

            - name: Upload performance baseline artifacts
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: performance-baseline-${{ runner.os }}
                  path: |
                      artifacts/performance-baseline.log
                      artifacts/performance-baseline.previous.json
                      artifacts/performance-baseline-cache/performance-baseline.json
                  if-no-files-found: warn
                  include-hidden-files: true
