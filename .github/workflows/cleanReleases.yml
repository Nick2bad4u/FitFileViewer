name: Clean Old Releases
run-name: Clean Old Releases (${{ github.ref_name }})

on:
    workflow_run:
        workflows: ["Build And Release Electron App"]
        types:
            - completed
        branches:
            - main
    workflow_dispatch:
        inputs:
            keep_last:
                description: "Number of most recent releases to keep"
                type: string
                required: true
                default: "10"
            delete_tags:
                description: "Also delete git tags (true/false)"
                type: boolean
                required: true
                default: true

concurrency:
    group: clean-releases-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    clean-releases:
        name: Clean Old Releases
        if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up git user
              run: |
                  git config --global user.name "Nick2bad4u"
                  git config --global user.email "20943337+Nick2bad4u@users.noreply.github.com"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: Clean old releases and tags
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  KEEP_LAST: ${{ inputs.keep_last }}
                  DELETE_TAGS: ${{ inputs.delete_tags }}
              run: |
                  KEEP_LAST=${KEEP_LAST:-10}
                  DELETE_TAGS=${DELETE_TAGS:-true}
                  echo "Keeping last $KEEP_LAST releases. Delete tags: $DELETE_TAGS"

                  clean_args=(scripts/clean-releases.mjs --keep-last "$KEEP_LAST" --yes)

                  if [ "$DELETE_TAGS" = "true" ]; then
                    clean_args+=(--delete-tags)
                  fi

                  node "${clean_args[@]}"
              continue-on-error: true
