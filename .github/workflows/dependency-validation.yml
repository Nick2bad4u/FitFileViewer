name: Dependency Validation
run-name: Dependency Validation (${{ github.ref_name }})

concurrency:
    group: dependency-validation-${{ github.ref }}
    cancel-in-progress: true

on:
    schedule:
        - cron: "23 9 * * 1"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    dependency-validation:
        name: Validate Dependency Graph
        runs-on: ubuntu-latest
        timeout-minutes: 60
        env:
            NODE_OPTIONS: --max_old_space_size=8192
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Setup Node.js environment (v24)
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version: 24

            - name: Install app and docs dependencies
              run: |
                  npm ci --no-audit --no-fund
                  npm ci --prefix docusaurus --no-audit --no-fund

            - name: Run release verification gate
              run: |
                  mkdir -p artifacts/dependency-validation
                  set -o pipefail
                  xvfb-run -a npm run release:verify 2>&1 | tee artifacts/dependency-validation/release-verify.log

            - name: Collect dependency validation diagnostics
              if: always()
              run: |
                  mkdir -p artifacts/dependency-validation
                  git status --short > artifacts/dependency-validation/git-status.txt
                  npm ls --all > artifacts/dependency-validation/npm-ls.txt 2>&1 || true
                  npm --prefix docusaurus ls --all > artifacts/dependency-validation/docusaurus-npm-ls.txt 2>&1 || true
                  if [ -d release-dist ]; then
                    npm run release:list-release-dist-files > artifacts/dependency-validation/release-dist-files.txt 2>&1 || true
                  fi
                  if [ -d test-results ]; then
                    cp -R test-results artifacts/dependency-validation/test-results
                  fi
                  if [ -d playwright-report ]; then
                    cp -R playwright-report artifacts/dependency-validation/playwright-report
                  fi

            - name: Upload dependency validation diagnostics
              if: failure()
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: dependency-validation-diagnostics
                  path: artifacts/dependency-validation/**
                  if-no-files-found: error
                  include-hidden-files: true
