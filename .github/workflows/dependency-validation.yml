name: Dependency Validation
run-name: Dependency Validation (${{ github.ref_name }})

concurrency:
    group: dependency-validation-${{ github.ref }}
    cancel-in-progress: true

on:
    schedule:
        - cron: "23 9 * * 1"
    pull_request:
        branches:
            - main
            - master
            - develop
            - "release/*"
        paths:
            - ".node-version"
            - ".nvmrc"
            - "package.json"
            - "package-lock.json"
            - "docusaurus/package.json"
            - "docusaurus/package-lock.json"
            - ".github/dependabot.yml"
            - ".github/workflows/auto-merge-dependabot-caller.yml"
            - ".github/workflows/dependency-validation.yml"
    merge_group:
        branches:
            - main
            - master
            - develop
            - "release/*"
        types:
            - checks_requested
    workflow_dispatch:

permissions:
    contents: read

jobs:
    dependency-validation:
        name: Validate Dependency Graph
        runs-on: ubuntu-latest
        timeout-minutes: 60
        env:
            NODE_OPTIONS: --max_old_space_size=8192
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0

            - name: Setup Node.js environment
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version

            - name: Setup npm version
              run: npm install --global npm@11.16.0

            - name: Install app and docs dependencies
              run: |
                  mkdir -p artifacts/dependency-validation
                  set -o pipefail
                  npm run sync:node-version-files:check 2>&1 | tee artifacts/dependency-validation/node-version-files-check.log
                  npm ci --no-audit --no-fund 2>&1 | tee artifacts/dependency-validation/npm-ci-app.log
                  npm ci --prefix docusaurus --no-audit --no-fund 2>&1 | tee artifacts/dependency-validation/npm-ci-docusaurus.log

            - name: Run release verification gate
              run: |
                  mkdir -p artifacts/dependency-validation
                  set -o pipefail
                  (xvfb-run -a npm run release:verify 2>&1 | tee artifacts/dependency-validation/release-verify.log) &
                  verify_pid=$!
                  while kill -0 "$verify_pid" 2>/dev/null; do
                      sleep 60
                      if kill -0 "$verify_pid" 2>/dev/null; then
                          echo "Release verification is still running..."
                      fi
                  done
                  wait "$verify_pid"

            - name: Verify unsigned package artifacts
              run: |
                  test -d release-dist
                  test -n "$(find release-dist -type f -print -quit)"
                  npm run release:list-release-dist-files

            - name: Collect dependency validation diagnostics
              if: always()
              run: |
                  mkdir -p artifacts/dependency-validation
                  node --version > artifacts/dependency-validation/node-version.txt
                  npm --version > artifacts/dependency-validation/npm-version.txt
                  git status --short > artifacts/dependency-validation/git-status.txt
                  cp .node-version artifacts/dependency-validation/repository-node-version.txt
                  cp .nvmrc artifacts/dependency-validation/repository-nvmrc.txt
                  cp package.json artifacts/dependency-validation/package.json
                  cp package-lock.json artifacts/dependency-validation/package-lock.json
                  cp docusaurus/package.json artifacts/dependency-validation/docusaurus-package.json
                  cp docusaurus/package-lock.json artifacts/dependency-validation/docusaurus-package-lock.json
                  npm ls --all > artifacts/dependency-validation/npm-ls.txt 2>&1 || true
                  npm --prefix docusaurus ls --all > artifacts/dependency-validation/docusaurus-npm-ls.txt 2>&1 || true
                  if [ -d release-dist ]; then
                    npm run release:list-release-dist-files > artifacts/dependency-validation/release-dist-files.txt 2>&1 || true
                    cp -R release-dist artifacts/dependency-validation/release-dist
                  fi
                  if [ -d dist ]; then
                    find dist -maxdepth 3 -type f | sort > artifacts/dependency-validation/dist-files.txt
                  fi
                  if [ -d artifacts ]; then
                    find artifacts -path artifacts/dependency-validation -prune -o -type f -print | sort > artifacts/dependency-validation/root-artifacts-files.txt
                    while IFS= read -r artifact_file; do
                      target="artifacts/dependency-validation/root-artifacts/${artifact_file#artifacts/}"
                      mkdir -p "$(dirname "$target")"
                      cp "$artifact_file" "$target"
                    done < artifacts/dependency-validation/root-artifacts-files.txt
                  fi
                  if [ -d test-results ]; then
                    cp -R test-results artifacts/dependency-validation/test-results
                  fi
                  if [ -d playwright-report ]; then
                    cp -R playwright-report artifacts/dependency-validation/playwright-report
                  fi

            - name: Summarize dependency validation diagnostics
              if: failure()
              run: |
                  {
                    echo "## Dependency validation diagnostics"
                    echo
                    echo "The failed dependency rehearsal uploaded \`dependency-validation-diagnostics\`."
                    echo
                    echo "### Captured logs"
                    echo "- \`artifacts/dependency-validation/node-version-files-check.log\`"
                    echo "- \`artifacts/dependency-validation/npm-ci-app.log\`"
                    echo "- \`artifacts/dependency-validation/npm-ci-docusaurus.log\`"
                    echo "- \`artifacts/dependency-validation/release-verify.log\`"
                    echo "- \`artifacts/dependency-validation/npm-ls.txt\`"
                    echo "- \`artifacts/dependency-validation/docusaurus-npm-ls.txt\`"
                    echo "- \`artifacts/dependency-validation/root-artifacts-files.txt\`"
                    echo
                    echo "### Node version files check tail"
                    if [ -f artifacts/dependency-validation/node-version-files-check.log ]; then
                      echo '```text'
                      tail -n 40 artifacts/dependency-validation/node-version-files-check.log
                      echo '```'
                    else
                      echo "_No Node version file check log was produced._"
                    fi
                    echo
                    echo "### App install tail"
                    if [ -f artifacts/dependency-validation/npm-ci-app.log ]; then
                      echo '```text'
                      tail -n 40 artifacts/dependency-validation/npm-ci-app.log
                      echo '```'
                    else
                      echo "_No app install log was produced._"
                    fi
                    echo
                    echo "### Docs install tail"
                    if [ -f artifacts/dependency-validation/npm-ci-docusaurus.log ]; then
                      echo '```text'
                      tail -n 40 artifacts/dependency-validation/npm-ci-docusaurus.log
                      echo '```'
                    else
                      echo "_No docs install log was produced._"
                    fi
                    echo
                    echo "### Release verification tail"
                    if [ -f artifacts/dependency-validation/release-verify.log ]; then
                      echo '```text'
                      tail -n 80 artifacts/dependency-validation/release-verify.log
                      echo '```'
                    else
                      echo "_No release verification log was produced._"
                    fi
                    echo
                    echo "### Root artifact inventory"
                    if [ -s artifacts/dependency-validation/root-artifacts-files.txt ]; then
                      echo '```text'
                      sed 's#^artifacts/##' artifacts/dependency-validation/root-artifacts-files.txt
                      echo '```'
                    else
                      echo "_No root artifacts were produced before failure._"
                    fi
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload dependency validation diagnostics
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: dependency-validation-diagnostics
                  path: artifacts/dependency-validation/**
                  if-no-files-found: error
                  include-hidden-files: true
