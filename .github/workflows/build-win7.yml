name: Carry Forward Windows 7 Compatibility Artifact
run-name: Carry Forward Windows 7 Compatibility Artifact (${{ github.ref_name }})

on:
    workflow_dispatch:
        inputs:
            target_tag:
                description: "Release tag that should receive the legacy Windows 7 assets. Defaults to the latest release."
                type: string
                required: false
            source_tag:
                description: "Release tag that already has legacy Windows 7 assets. Defaults to the newest prior matching release."
                type: string
                required: false
    workflow_run:
        workflows: ["Build And Release Electron App"]
        types:
            - completed
        branches:
            - main

concurrency:
    group: win7-carry-forward-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    carry-forward-win7:
        name: Carry Forward Win7 Portable Snapshot
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
        steps:
            - name: Harden the runner (audit only)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Resolve source and target releases
              id: releases
              shell: pwsh
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  MANUAL_SOURCE_TAG: ${{ inputs.source_tag }}
                  MANUAL_TARGET_TAG: ${{ inputs.target_tag }}
              run: |
                  $ErrorActionPreference = "Stop"
                  $releases = gh release list --repo $env:GITHUB_REPOSITORY --limit 100 --json tagName,isDraft,publishedAt | ConvertFrom-Json
                  $publishedReleases = @($releases | Where-Object { -not $_.isDraft })

                  if ($publishedReleases.Count -eq 0) {
                      throw "No published releases found for $env:GITHUB_REPOSITORY"
                  }

                  $targetTag = $env:MANUAL_TARGET_TAG
                  if ([string]::IsNullOrWhiteSpace($targetTag)) {
                      $targetTag = $publishedReleases[0].tagName
                  }

                  gh release view $targetTag --repo $env:GITHUB_REPOSITORY --json tagName | Out-Null

                  $sourceTag = $env:MANUAL_SOURCE_TAG
                  if ([string]::IsNullOrWhiteSpace($sourceTag)) {
                      foreach ($release in $publishedReleases) {
                          if ($release.tagName -eq $targetTag) {
                              continue
                          }

                          $sourceRelease = gh release view $release.tagName --repo $env:GITHUB_REPOSITORY --json assets | ConvertFrom-Json
                          $win7Assets = @($sourceRelease.assets | Where-Object { $_.name -like "Fit-File-Viewer-win7-*" })
                          if ($win7Assets.Count -gt 0) {
                              $sourceTag = $release.tagName
                              break
                          }
                      }
                  }

                  if ([string]::IsNullOrWhiteSpace($sourceTag)) {
                      throw "No prior release with Fit-File-Viewer-win7-* assets was found"
                  }

                  if ($sourceTag -eq $targetTag) {
                      throw "The Windows 7 source release cannot be the same as the target release: $targetTag"
                  }

                  $validatedSource = gh release view $sourceTag --repo $env:GITHUB_REPOSITORY --json assets | ConvertFrom-Json
                  $sourceAssets = @($validatedSource.assets | Where-Object { $_.name -like "Fit-File-Viewer-win7-*" })
                  if ($sourceAssets.Count -eq 0) {
                      throw "Source release $sourceTag does not contain Fit-File-Viewer-win7-* assets"
                  }

                  "source_tag=$sourceTag" >> $env:GITHUB_OUTPUT
                  "target_tag=$targetTag" >> $env:GITHUB_OUTPUT
                  "asset_count=$($sourceAssets.Count)" >> $env:GITHUB_OUTPUT

            - name: Download legacy Windows 7 assets
              shell: pwsh
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SOURCE_TAG: ${{ steps.releases.outputs.source_tag }}
              run: |
                  $ErrorActionPreference = "Stop"
                  New-Item -ItemType Directory -Force -Path legacy-win7-assets | Out-Null
                  gh release download $env:SOURCE_TAG --repo $env:GITHUB_REPOSITORY --pattern "Fit-File-Viewer-win7-*" --dir legacy-win7-assets --clobber
                  $assets = @(Get-ChildItem -Path legacy-win7-assets -File)

                  if ($assets.Count -eq 0) {
                      throw "No Windows 7 assets were downloaded from $env:SOURCE_TAG"
                  }

            - name: Upload legacy Windows 7 assets to target release
              shell: pwsh
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TARGET_TAG: ${{ steps.releases.outputs.target_tag }}
              run: |
                  $ErrorActionPreference = "Stop"
                  $assets = @(Get-ChildItem -Path legacy-win7-assets -File)
                  $assetPaths = @($assets | ForEach-Object { $_.FullName })
                  gh release upload $env:TARGET_TAG @assetPaths --repo $env:GITHUB_REPOSITORY --clobber
                  "Carried forward $($assets.Count) Windows 7 asset(s) to $env:TARGET_TAG."
