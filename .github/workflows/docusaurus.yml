name: Deploy Docusaurus Documentation
run-name: Deploy Docusaurus Documentation (${{ github.ref_name }})

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Build And Release Electron App"]
        types:
            - completed
        branches:
            - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment
concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build:
        name: Build Documentation
        if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 20
        defaults:
            run:
                shell: bash
                working-directory: docusaurus
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: docusaurus/package-lock.json

            - name: Install dependencies
              run: npm ci --force

            - name: Build website
              env:
                  DOCUSAURUS_SITE_URL: https://nick2bad4u.github.io
                  DOCUSAURUS_BASE_URL: /FitFileViewer/
              run: npm run build

            - name: Setup Pages
              uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
              with:
                  path: docusaurus/build

    deploy:
        name: Deploy Documentation
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
