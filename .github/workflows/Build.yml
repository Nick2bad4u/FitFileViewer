    update-changelogs:
        name: Update Changelogs
        needs: [release, bump-version]
        if: ${{ needs.release.result == 'success' && needs.bump-version.result == 'success' }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: main
                  fetch-depth: 0
                  fetch-tags: true

            - name: Create Check Run
              env:
                  GH_TOKEN: ${{ github.token }}
              run: node scripts/update-changelog-check-run.mjs create

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version

            - name: Setup npm version
              run: npm install --global npm@11.16.0

            - name: Install dependencies
              run: npm ci --ignore-scripts --no-audit --no-fund

            - name: Verify changelog release tag
              env:
                  EXPECTED_TAG: v${{ needs.bump-version.outputs.new_version }}
              run: |
                  set -euo pipefail

                  if [ -z "$EXPECTED_TAG" ]; then
                    echo "::error::The release version step did not provide an expected tag."
                    exit 1
                  fi

                  tag_ref="refs/tags/${EXPECTED_TAG}"
                  if ! git show-ref --verify --quiet "$tag_ref"; then
                    echo "::error::Expected local tag ${EXPECTED_TAG} does not exist."
                    exit 1
                  fi

                  tag_commit=$(git rev-parse "${tag_ref}^{commit}")
                  head_commit=$(git rev-parse HEAD)
                  if [ "$tag_commit" != "$head_commit" ]; then
                    echo "::error::Tag ${EXPECTED_TAG} points to ${tag_commit}, but HEAD is ${head_commit}."
                    exit 1
                  fi

                  head_tags=$(git tag --points-at HEAD --sort=refname)
                  if [ "$head_tags" != "$EXPECTED_TAG" ]; then
                    displayed_head_tags=${head_tags//$'\n'/, }
                    if [ -z "$displayed_head_tags" ]; then
                      displayed_head_tags="(none)"
                    fi
                    echo "::error::Expected ${EXPECTED_TAG} to be the only tag at HEAD, but found: ${displayed_head_tags}."
                    exit 1
                  fi

            - name: Generate root CHANGELOG.md
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npm run changelog:workflow

            - name: Commit and push changelog updates
              run: node scripts/commit-changelog-workflow.mjs
              env:
                  CHANGELOG_VERSION: ${{ needs.bump-version.outputs.new_version }}
                  TARGET_BRANCH: ${{ inputs.branch || github.ref_name }}

            - name: Update Check Run - Changelogs Generated
              if: success()
              env:
                  CHANGELOG_VERSION: ${{ needs.bump-version.outputs.new_version }}
                  GH_TOKEN: ${{ github.token }}
              run: node scripts/update-changelog-check-run.mjs generated

            - name: Complete Check Run
              if: always()
              env:
                  GH_TOKEN: ${{ github.token }}
                  JOB_STATUS: ${{ job.status }}
              run: node scripts/update-changelog-check-run.mjs complete

            - name: Add Changelog Job Summary
              if: always()
              run: node scripts/update-changelog-job-summary.mjs
              env:
                  CHANGELOG_VERSION: ${{ needs.bump-version.outputs.new_version }}
                  JOB_STATUS: ${{ job.status }}
