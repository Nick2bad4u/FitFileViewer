name: Build And Release Electron App
run-name: Build And Release Electron App (${{ github.ref_name }})

concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: true

on:
    workflow_dispatch:
        inputs:
            branch:
                description: "Branch to run against"
                type: string
                required: true
                default: "main"

permissions:
    actions: read
    checks: write
    contents: write
jobs:
    bump-version:
        name: Bump Version
        runs-on: ubuntu-latest
        timeout-minutes: 60
        env:
            NODE_OPTIONS: --max_old_space_size=8192
        defaults:
            run:
                shell: bash
        outputs:
            new_version: ${{ steps.bump.outputs.new_version }}
            bump_sha: ${{ steps.commit_version.outputs.bump_sha }}
        steps:
            - name: Harden the runner (Audit all outbound calls)
              id: harden_runner
              uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              id: checkout_code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ inputs.branch || github.ref }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Setup Node.js environment (v24)
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version: 24

            - name: Install workspace dependencies
              run: npm ci --no-audit --no-fund

            - name: Run repository lint gates
              run: npm run lint

            - name: Run Electron runtime TypeScript build
              run: npm run build:runtime-ts

            - name: Run Electron test suite
              run: npm test

            - name: Run Electron Playwright smoke test
              run: xvfb-run -a npm run test:playwright

            - name: Run Docusaurus typecheck
              run: npm run docs:typecheck

            - name: Build Docusaurus site
              run: npm run docs:build

            - name: Show git diff for electron-app (debug)
              id: git_diff
              run: node scripts/print-electron-app-diff.mjs
              continue-on-error: true

            - name: Bump package.json version number
              id: bump
              run: node scripts/bump-app-version.mjs --github-output

            - name: Commit, push, and tag version bump
              id: commit_version
              if: steps.bump.outputs.new_version != ''
              run: >
                  node scripts/publish-app-version.mjs
                  --version "${{ steps.bump.outputs.new_version }}"
                  --branch "${{ inputs.branch || github.ref_name }}"
                  --github-output

    build:
        name: Build (${{ matrix.os }}, ${{ matrix.arch }})
        needs: bump-version
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        env:
            # Vite/electron-builder can be memory intensive across renderer/main/preload builds.
            # Keep this aligned with the known-good workflow pattern.
            NODE_OPTIONS: --max_old_space_size=8192
        strategy:
            matrix:
                os:
                    - ubuntu-latest
                    - ubuntu-24.04-arm
                    - windows-latest
                    - macos-15
                    - macos-latest
                    - macos-15-intel

                arch: [x64, ia32, arm64]
                exclude:
                    # Exclude macOS with ia32 architecture as it is not supported by Electron
                    - os: macos-latest
                      arch: ia32
                    - os: macos-latest
                      arch: arm64
                    - os: macos-15
                      arch: ia32
                    - os: macos-15
                      arch: x64
                    - os: macos-15-intel
                      arch: ia32
                    - os: macos-15-intel
                      arch: arm64
                    # Exclude Ubuntu with ia32 and arm64 architectures as they are not commonly used and not officially supported except for ubuntu-24.04-arm/arm64
                    - os: ubuntu-latest
                      arch: ia32
                    - os: ubuntu-latest
                      arch: arm64
                    # Exclude ubuntu-24.04-arm with x64 and ia32
                    - os: ubuntu-24.04-arm
                      arch: x64
                    - os: ubuntu-24.04-arm
                      arch: ia32
                    - os: ubuntu-24.04-arm
                      arch: arm64
                    # Exclude Windows with arm64 (not supported)
                    - os: windows-latest
                      arch: arm64
                    # Exclude Windows with ia32 (if not supported, uncomment)
                    # - os: windows-latest
                    #   arch: ia32
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ needs.bump-version.outputs.bump_sha }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Setup Node.js environment (v24)
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version: 24

            - name: Install Linux build dependencies
              id: install_linux_deps
              if: runner.os == 'Linux'
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y rpm dpkg fakeroot xz-utils flatpak flatpak-builder ruby ruby-dev build-essential zlib1g-dev
                  sudo gem install --no-document fpm
                  sudo apt-get install -y libarchive-tools
                  sudo apt-get install -y pkg-config pkgconf pkg-haskell-tools pkg-js-tools pkg-kde-tools pkg-perl-tools pkg-php-tools
                  which bsdtar
                  sudo apt-get install -y pacman

            - name: Install macOS build dependencies
              id: install_macos_deps
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  brew install rpm dpkg xz gnu-tar

            - name: Install Windows build dependencies (Chocolatey)
              id: install_windows_deps
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  choco install -y 7zip.install
                  # Install NSIS (makensis) to avoid issues with NSIS target building on some runners
                  choco install -y nsis

            - name: Cache node modules (Windows)
              id: cache_node_modules_windows
              if: runner.os == 'Windows'
              uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: |
                      ~\.npm
                      node_modules
                      docusaurus\node_modules
                      ~\.cache
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-
                  enableCrossOsArchive: true
              continue-on-error: true

            - name: Cache node modules (non-Windows)
              id: cache_node_modules_non_windows
              if: runner.os != 'Windows'
              uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: |
                      ~/.npm
                      node_modules
                      docusaurus/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-
                  enableCrossOsArchive: true
              continue-on-error: true

            - name: Install workspace dependencies
              id: install_dependencies
              shell: bash
              run: npm ci --no-audit --no-fund

            - name: Install dmg-license workaround for Mac Builder
              id: install_dmg_license
              if: runner.os == 'macOS'
              shell: bash
              run: npm run build:macos-deps

            # - name: Install electron-builder
            #   run: npm install -D electron-builder

            - name: Build Electron app (debug)
              id: build_app
              shell: bash
              run: npm run build:ci-matrix
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  DEBUG_DEMB: true
                  CI: true
                  DEBUG: "@malept/flatpak-bundler"
                  MATRIX_ARCH: ${{ matrix.arch }}
                  MATRIX_OS: ${{ matrix.os }}
                  RUNNER_OS: ${{ runner.os }}

            - name: Print distributable hashes (debug)
              id: print_hashes
              shell: bash
              run: node scripts/print-distributable-hashes.mjs electron-app/release
              continue-on-error: true

            - name: Upload build release files as artifact
              id: upload_artifact
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: dist-${{ matrix.os }}-${{ matrix.arch }}
                  path: |
                      electron-app/release/Fit-File-Viewer-*
                      electron-app/release/latest*.yml
                      electron-app/release/squirrel*/*
                      electron-app/release/nsis-web/*
                  include-hidden-files: true

            - name: Update Build Matrix Summary (per platform/arch)
              if: always()
              shell: bash
              run: node scripts/update-build-matrix-summary.mjs
              env:
                  BUILD_APP_OUTCOME: ${{ steps.build_app.outcome }}
                  BUILD_VERSION: ${{ needs.bump-version.outputs.new_version }}
                  JOB_STATUS: ${{ job.status }}
                  MATRIX_ARCH: ${{ matrix.arch }}
                  MATRIX_OS: ${{ matrix.os }}

    release:
        name: Create Release
        needs: [build, bump-version]
        if: ${{ needs.build.result == 'success' && needs.bump-version.result == 'success' }}
        runs-on: ubuntu-latest
        timeout-minutes: 45
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ needs.bump-version.outputs.bump_sha }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Download all build artifacts from build job
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  path: ./artifacts

            - name: Print artifact hashes (debug)
              id: print_artifact_hashes
              shell: bash
              run: node scripts/print-distributable-hashes.mjs artifacts

            - name: Generate release notes since previous tag
              id: release_notes
              shell: bash
              run: >
                  node scripts/generate-release-notes.mjs
                  --version "${{ needs.bump-version.outputs.new_version }}"
                  --repository "${{ github.repository }}"
                  --github-output

            - name: List artifacts (debug)
              id: list_artifacts
              run: ls -R ./artifacts

            - name: Rename Windows latest.yml files for unique arch/platform
              id: rename_windows_latest_yml
              shell: bash
              run: node scripts/rename-windows-latest-yml.mjs

            - name: Organize distributables by platform and arch
              id: organize_distributables
              shell: bash
              run: node scripts/organize-distributables.mjs

            - name: Fix all sha512 in latest*.yml files
              id: fix_sha512
              shell: bash
              run: node scripts/fix-latest-yml-sha512.mjs

            - name: Print fixed artifact hashes (debug)
              id: print_artifact_hashes_debug
              shell: bash
              run: node scripts/print-distributable-hashes.mjs artifacts

            - name: List release-dist files (debug)
              id: list-dedupe
              run: node scripts/list-release-dist-files.mjs
              shell: bash
              continue-on-error: true

            - name: Rename Squirrel win32 nupkg and RELEASES for release
              shell: bash
              run: node scripts/rename-squirrel-win32-release-assets.mjs
              continue-on-error: true

            - name: Create or update release with distributable builds
              id: release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
              with:
                  tag_name: v${{ needs.bump-version.outputs.new_version }}
                  name: FitFileViewer v${{ needs.bump-version.outputs.new_version }}
                  body: |
                      ## 🚀 Release Notes

                      ${{ steps.release_notes.outputs.notes }}

                      **[📄 View Full Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)**

                      ---

                      <details>
                        <summary><strong>🔍 Merge Commit Details</strong></summary>

                      **Message:**
                      ```
                      ${{ steps.release_notes.outputs.notes }}
                      ```

                      **Commit SHA:** `${{ needs.bump-version.outputs.bump_sha }}`
                      </details>

