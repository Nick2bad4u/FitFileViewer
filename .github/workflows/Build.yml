name: Build and Release Electron App
run-name: Build and Release Electron App (${{ github.ref_name }})

concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: true

on:
    workflow_dispatch:
        inputs:
            branch:
                description: "Branch to run against"
                type: string
                required: true
                default: "main"
            require-code-signing:
                description: "Require Windows and macOS release artifacts to be signed"
                type: boolean
                required: true
                default: false
            release-type:
                description: "Semantic version increment"
                type: choice
                required: true
                default: patch
                options:
                    - patch
                    - minor
                    - major
            reuse-current-version:
                description: "Reuse the package version and matching tag after a failed unpublished release"
                type: boolean
                required: true
                default: false

permissions:
    actions: read
    checks: write
    contents: write
jobs:
    bump-version:
        name: Bump Version
        runs-on: ubuntu-latest
        timeout-minutes: 60
        env:
            NODE_OPTIONS: --max_old_space_size=8192
        defaults:
            run:
                shell: bash
        outputs:
            new_version: ${{ steps.bump.outputs.new_version || steps.reuse_version.outputs.new_version }}
            bump_sha: ${{ steps.commit_version.outputs.bump_sha || steps.reuse_version.outputs.bump_sha }}
        steps:
            - name: Harden the runner (Audit all outbound calls)
              id: harden_runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              id: checkout_code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: ${{ inputs.branch || github.ref }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Setup Node.js environment
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version

            - name: Setup npm version
              shell: bash
              run: npm install --global npm@11.16.0

            - name: Install app and docs dependencies
              run: |
                  npm ci --no-audit --no-fund
                  npm ci --prefix docusaurus --no-audit --no-fund

            - name: Run release verification gate
              run: |
                  xvfb-run -a npm run release:verify &
                  verify_pid=$!
                  while kill -0 "$verify_pid" 2>/dev/null; do
                      sleep 60
                      if kill -0 "$verify_pid" 2>/dev/null; then
                          echo "Release verification is still running..."
                      fi
                  done
                  wait "$verify_pid"

            - name: Show git diff for app source (debug)
              id: git_diff
              run: node scripts/print-app-diff.mjs
              continue-on-error: true

            - name: Bump package.json version number
              id: bump
              if: ${{ !inputs.reuse-current-version }}
              run: >-
                  node scripts/bump-app-version.mjs
                  --release-type "${{ inputs.release-type }}"
                  --github-output

            - name: Reuse current version after failed release
              id: reuse_version
              if: ${{ inputs.reuse-current-version }}
              run: |
                  version=$(node --input-type=module -e 'import fs from "node:fs"; const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); process.stdout.write(pkg.version);')
                  head_sha=$(git rev-parse HEAD)
                  tag_sha=$(git rev-list -n 1 "v${version}")
                  if [ "$tag_sha" != "$head_sha" ]; then
                      echo "v${version} resolves to $tag_sha instead of checked-out commit $head_sha" >&2
                      exit 1
                  fi
                  echo "new_version=$version" >> "$GITHUB_OUTPUT"
                  echo "bump_sha=$head_sha" >> "$GITHUB_OUTPUT"

            - name: Commit, push, and tag version bump
              id: commit_version
              if: steps.bump.outputs.new_version != ''
              run: >
                  node scripts/publish-app-version.mjs
                  --version "${{ steps.bump.outputs.new_version }}"
                  --branch "${{ inputs.branch || github.ref_name }}"
                  --github-output

    build:
        name: Build (${{ matrix.os }}, ${{ matrix.arch }})
        needs: bump-version
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        env:
            # Vite/electron-builder can be memory intensive across renderer/main/preload builds.
            # Keep this aligned with the known-good workflow pattern.
            NODE_OPTIONS: --max_old_space_size=8192
        strategy:
            matrix:
                os:
                    - ubuntu-latest
                    - ubuntu-24.04-arm
                    - windows-latest
                    - macos-15
                    - macos-latest
                    - macos-15-intel

                arch: [x64, ia32, arm64]
                exclude:
                    # Exclude macOS with ia32 architecture as it is not supported by Electron
                    - os: macos-latest
                      arch: ia32
                    - os: macos-latest
                      arch: arm64
                    - os: macos-15
                      arch: ia32
                    - os: macos-15
                      arch: x64
                    - os: macos-15-intel
                      arch: ia32
                    - os: macos-15-intel
                      arch: arm64
                    # Exclude Ubuntu with ia32 and arm64 architectures as they are not commonly used and not officially supported except for ubuntu-24.04-arm/arm64
                    - os: ubuntu-latest
                      arch: ia32
                    - os: ubuntu-latest
                      arch: arm64
                    # Exclude ubuntu-24.04-arm with x64 and ia32
                    - os: ubuntu-24.04-arm
                      arch: x64
                    - os: ubuntu-24.04-arm
                      arch: ia32
                    - os: ubuntu-24.04-arm
                      arch: arm64
                    # Exclude Windows with arm64 (not supported)
                    - os: windows-latest
                      arch: arm64
                    # Exclude Windows with ia32 (if not supported, uncomment)
                    # - os: windows-latest
                    #   arch: ia32
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: ${{ needs.bump-version.outputs.bump_sha }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Setup Node.js environment
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version

            - name: Setup npm version
              shell: bash
              run: npm install --global npm@11.16.0

            - name: Install platform build dependencies
              shell: bash
              run: node scripts/install-build-dependencies.mjs

            - name: Cache node modules (Windows)
              id: cache_node_modules_windows
              if: runner.os == 'Windows'
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: |
                      ~\.npm
                      node_modules
                      docusaurus\node_modules
                      ~\.cache
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'docusaurus/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-
                  enableCrossOsArchive: true
              continue-on-error: true

            - name: Cache node modules (non-Windows)
              id: cache_node_modules_non_windows
              if: runner.os != 'Windows'
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: |
                      ~/.npm
                      node_modules
                      docusaurus/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'docusaurus/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-
                  enableCrossOsArchive: true
              continue-on-error: true

            - name: Install app and docs dependencies
              id: install_dependencies
              shell: bash
              run: |
                  npm ci --no-audit --no-fund
                  npm ci --prefix docusaurus --no-audit --no-fund

            - name: Install dmg-license workaround for Mac Builder
              id: install_dmg_license
              if: runner.os == 'macOS'
              shell: bash
              run: npm run build:macos-deps

            - name: Prepare Apple API key when configured
              if: runner.os == 'macOS' && inputs.require-code-signing
              shell: bash
              env:
                  APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
                  APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_FitFileViewer.p8
              run: |
                  if [ -n "$APPLE_API_KEY_BASE64" ]; then
                      node --input-type=module -e 'import fs from "node:fs"; const key = Buffer.from(process.env.APPLE_API_KEY_BASE64, "base64").toString("utf8"); if (!key.trim().startsWith("-----BEGIN PRIVATE KEY-----")) throw new Error("APPLE_API_KEY_BASE64 is not a base64-encoded .p8 private key"); fs.writeFileSync(process.env.APPLE_API_KEY_PATH, key, { mode: 0o600 });'
                      echo "APPLE_API_KEY=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
                  fi

            - name: Check signing environment
              id: check_signing_environment
              shell: bash
              run: npm run release:check-signing -- --runner-os "$RUNNER_OS"
              env:
                  REQUIRE_CODE_SIGNING: ${{ inputs.require-code-signing }}
                  RUNNER_OS: ${{ runner.os }}
                  APPLE_API_ISSUER: ${{ runner.os == 'macOS' && secrets.APPLE_API_ISSUER || '' }}
                  APPLE_API_KEY_ID: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY_ID || '' }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
                  APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
                  APPLE_KEYCHAIN_PROFILE: ${{ runner.os == 'macOS' && secrets.APPLE_KEYCHAIN_PROFILE || '' }}
                  APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
                  CSC_INSTALLER_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_INSTALLER_KEY_PASSWORD || '' }}
                  CSC_INSTALLER_LINK: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_INSTALLER_LINK || '' }}
                  CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_KEY_PASSWORD || runner.os == 'Windows' && secrets.WINDOWS_CSC_KEY_PASSWORD || '' }}
                  CSC_LINK: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_LINK || '' }}
                  WIN_CSC_LINK: ${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_LINK || '' }}

            - name: Build Electron app (debug)
              id: build_app
              shell: bash
              run: npm run build:ci-matrix
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  DEBUG_DEMB: true
                  CI: true
                  DEBUG: "@malept/flatpak-bundler"
                  MATRIX_ARCH: ${{ matrix.arch }}
                  MATRIX_OS: ${{ matrix.os }}
                  REQUIRE_CODE_SIGNING: ${{ inputs.require-code-signing }}
                  RUNNER_OS: ${{ runner.os }}
                  APPLE_API_ISSUER: ${{ runner.os == 'macOS' && secrets.APPLE_API_ISSUER || '' }}
                  APPLE_API_KEY_ID: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY_ID || '' }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
                  APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
                  APPLE_KEYCHAIN_PROFILE: ${{ runner.os == 'macOS' && secrets.APPLE_KEYCHAIN_PROFILE || '' }}
                  APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
                  CSC_INSTALLER_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_INSTALLER_KEY_PASSWORD || '' }}
                  CSC_INSTALLER_LINK: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_INSTALLER_LINK || '' }}
                  CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_KEY_PASSWORD || runner.os == 'Windows' && secrets.WINDOWS_CSC_KEY_PASSWORD || '' }}
                  CSC_LINK: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_LINK || '' }}
                  WIN_CSC_LINK: ${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_LINK || '' }}

            - name: Verify release artifact signing policy
              id: verify_signed_artifacts
              if: runner.os == 'Windows' || runner.os == 'macOS'
              shell: bash
              run: npm run release:verify-signing-artifacts -- --runner-os "$RUNNER_OS"
              env:
                  REQUIRE_CODE_SIGNING: ${{ inputs.require-code-signing }}
                  RUNNER_OS: ${{ runner.os }}

            - name: Smoke test packaged build
              id: smoke_packaged_app
              shell: bash
              run: |
                  if [ "$RUNNER_OS" = "Linux" ]; then
                      xvfb-run -a npm run test:packaged
                  else
                      npm run test:packaged
                  fi
              env:
                  FFV_PACKAGED_SMOKE_TIMEOUT_MS: "15000"
                  RUNNER_OS: ${{ runner.os }}

            - name: Print distributable hashes (debug)
              id: print_hashes
              shell: bash
              run: node scripts/print-distributable-hashes.mjs release-dist
              continue-on-error: true

            - name: Upload build release files as artifact
              id: upload_artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: dist-${{ matrix.os }}-${{ matrix.arch }}
                  path: |
                      release-dist/Fit-File-Viewer-*
                      release-dist/latest*.yml
                      release-dist/signing-verification-report.json
                      release-dist/squirrel*/*
                      release-dist/nsis-web/*
                  include-hidden-files: true

            - name: Update Build Matrix Summary (per platform/arch)
              if: always()
              shell: bash
              run: node scripts/update-build-matrix-summary.mjs
              env:
                  BUILD_APP_OUTCOME: ${{ steps.build_app.outcome }}
                  BUILD_VERSION: ${{ needs.bump-version.outputs.new_version }}
                  JOB_STATUS: ${{ job.status }}
                  MATRIX_ARCH: ${{ matrix.arch }}
                  MATRIX_OS: ${{ matrix.os }}
                  PACKAGED_SMOKE_OUTCOME: ${{ steps.smoke_packaged_app.outcome }}
                  SIGNING_VERIFICATION_OUTCOME: ${{ steps.verify_signed_artifacts.outcome }}

    release:
        name: Create Release
        needs: [build, bump-version]
        if: ${{ needs.build.result == 'success' && needs.bump-version.result == 'success' }}
        runs-on: ubuntu-latest
        timeout-minutes: 45
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout Repo code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: ${{ needs.bump-version.outputs.bump_sha }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Setup Node.js environment
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version

            - name: Setup npm version
              run: npm install --global npm@11.16.0

            - name: Install release verification dependencies
              run: npm ci --ignore-scripts --no-audit --no-fund

            - name: Download all build artifacts from build job
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: ./artifacts

            - name: Print artifact hashes (debug)
              id: print_artifact_hashes
              shell: bash
              run: node scripts/print-distributable-hashes.mjs artifacts

            - name: Generate release notes since previous tag
              id: release_notes
              shell: bash
              run: >
                  node scripts/generate-release-notes.mjs
                  --version "${{ needs.bump-version.outputs.new_version }}"
                  --repository "${{ github.repository }}"
                  --github-output

            - name: List artifacts (debug)
              id: list_artifacts
              run: ls -R ./artifacts

            - name: Rename Windows latest.yml files for unique arch/platform
              id: rename_windows_latest_yml
              shell: bash
              run: node scripts/rename-windows-latest-yml.mjs

            - name: Organize distributables by platform and arch
              id: organize_distributables
              shell: bash
              run: node scripts/organize-distributables.mjs

            - name: Fix all sha512 in latest*.yml files
              id: fix_sha512
              shell: bash
              run: node scripts/fix-latest-yml-sha512.mjs

            - name: Print fixed artifact hashes (debug)
              id: print_artifact_hashes_debug
              shell: bash
              run: node scripts/print-distributable-hashes.mjs artifacts

            - name: List release-dist files (debug)
              id: list-dedupe
              run: node scripts/list-release-dist-files.mjs
              shell: bash
              continue-on-error: true

            - name: Rename Squirrel win32 nupkg and RELEASES for release
              shell: bash
              run: node scripts/rename-squirrel-win32-release-assets.mjs
              continue-on-error: true

            - name: Create draft release with distributable builds
              id: release
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
              with:
                  tag_name: v${{ needs.bump-version.outputs.new_version }}
                  name: FitFileViewer v${{ needs.bump-version.outputs.new_version }}
                  body: |
                      ## 🚀 Release Notes

                      This is the first FitFileViewer release built from the migrated TypeScript runtime sources for the main process, preload, renderer, and application utilities.

                      ${{ inputs.require-code-signing && 'Windows and macOS release artifacts were built with required code signing.' || 'Release artifacts are intentionally unsigned, consistent with previous FitFileViewer releases.' }}

                      ${{ steps.release_notes.outputs.notes }}

                      **[📄 View Full Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)**

                      ---

                      <details>
                        <summary><strong>🔍 Release Commit Details</strong></summary>

                      **Commit SHA:** `${{ needs.bump-version.outputs.bump_sha }}`
                      </details>

                      ---

                      ### 📦 Download FitFileViewer

                      <sub> - Most Windows users should download the "Installer EXE", "MSI" or "Portable" versions  </sub>

                      | Windows  | Builds       | Format           | Download Link |
                      |----------|--------------|------------------|---------------|
                      | Windows  | x64          | Installer EXE    | [Fit-File-Viewer-nsis-x64-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-nsis-x64-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | x64          | Installer Web    | [Fit-File-Viewer-nsis-web-x64-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-nsis-web-x64-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | x64          | Installer 7z     | [fitfileviewer-${{ needs.bump-version.outputs.new_version }}-x64.nsis.7z](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/fitfileviewer-${{ needs.bump-version.outputs.new_version }}-x64.nsis.7z) |
                      | Windows  | x64          | MSI              | [Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.msi](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.msi) |
                      | Windows  | x64          | MSI 7z           | [Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.7z](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.7z) |
                      | Windows  | x64          | MSI TAR.BZ2      | [Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.tar.bz2](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.tar.bz2) |
                      | Windows  | x64          | MSI TAR.GZ       | [Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.tar.gz](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.tar.gz) |
                      | Windows  | x64          | MSI TAR.XZ       | [Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.tar.xz](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.tar.xz) |
                      | Windows  | x64          | MSI ZIP          | [Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.zip](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-msi-x64-${{ needs.bump-version.outputs.new_version }}.zip) |
                      | Windows  | x64          | Portable         | [Fit-File-Viewer-portable-x64-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-portable-x64-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | ia32 / win32 | Installer EXE    | [Fit-File-Viewer-nsis-ia32-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-nsis-ia32-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | ia32 / win32 | Installer Web    | [Fit-File-Viewer-nsis-web-ia32-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-nsis-web-ia32-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | ia32 / win32 | Installer 7z     | [fitfileviewer-${{ needs.bump-version.outputs.new_version }}-ia32.nsis.7z](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/fitfileviewer-${{ needs.bump-version.outputs.new_version }}-ia32.nsis.7z) |
                      | Windows  | ia32 / win32 | MSI              | [Fit-File-Viewer-msi-ia32-${{ needs.bump-version.outputs.new_version }}.msi](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-msi-ia32-${{ needs.bump-version.outputs.new_version }}.msi) |
                      | Windows  | ia32 / win32 | MSI 7z           | [Fit-File-Viewer-msi-ia32-${{ needs.bump-version.outputs.new_version }}.7z](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-msi-ia32-${{ needs.bump-version.outputs.new_version }}.7z) |
                      | Windows  | ia32 / win32 | MSI TAR.BZ2      | [Fit-File-Viewer-msi-ia32-${{ needs.bump-version.outputs.new_version }}.tar.bz2](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Fit-File-Viewer-msi-ia32-${{ needs.bump-version.outputs.new_version }}.tar.bz2) |
