# GitHub Action to build Flatpak using flatpak-builder
# This workflow builds your Electron app as a Flatpak using flatpak-builder directly.

name: Build Flatpak
run-name: Build Flatpak (${{ github.ref_name }})

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Build And Release Electron App"]
        types:
            - completed
        branches:
            - main

concurrency:
    group: flatpak-build-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    build-flatpak:
        name: Build Flatpak
        if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 60
        defaults:
            run:
                shell: bash
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version

            - name: Setup npm version
              run: npm install --global npm@11.16.0

            - name: Cache node modules (non-Windows)
              id: cache_node_modules_non_windows
              if: runner.os != 'Windows'
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: |
                      ~/.npm
                      node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-
                  enableCrossOsArchive: true
              continue-on-error: true

            - name: Install Flatpak and flatpak-builder
              run: npm run build:flatpak-deps

            - name: Install dependencies
              run: npm ci --no-audit --no-fund

            - name: Build Flatpak
              run: npm run build:flatpak
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CI: true
                  DEBUG: "@malept/flatpak-bundler"

            - name: Smoke test Flatpak bundle
              run: |
                  flatpak install --user --noninteractive --or-update ./FitFileViewer.flatpak
                  smoke_launcher="${RUNNER_TEMP}/run-fitfileviewer-flatpak"
                  printf '%s\n' '#!/usr/bin/env bash' \
                    'exec xvfb-run -a flatpak run --user com.nick2bad4u.fitfileviewer' \
                    > "${smoke_launcher}"
                  chmod +x "${smoke_launcher}"
                  node scripts/run-packaged-smoke.mjs \
                    --executable "${smoke_launcher}" \
                    --startup-timeout-ms 15000

            # Optionally, upload the FlatPak bundle as an artifact
            - name: Upload FlatPak bundle
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: flatpak-bundle
                  path: FitFileViewer.flatpak

            - name: Get latest release tag
              id: get_release
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      const releases = await github.rest.repos.listReleases({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                      });
                      if (releases.data.length === 0) {
                        throw new Error('No releases found');
                      }
                      return releases.data[0].tag_name;
                  result-encoding: string

            - name: Upload .flatpak and .zip to latest release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  RELEASE_TAG: ${{ steps.get_release.outputs.result }}
              run: npm run release:flatpak-assets
